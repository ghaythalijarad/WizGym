<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WizGym — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=Tajawal:wght@500;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="config.js"></script>
</head>
<body>
  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><span class="material-icons-round">fitness_center</span></div>
      <span class="brand-name">WizGym</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard">
        <span class="material-icons-round">dashboard</span>
        <span>لوحة التحكم</span>
      </a>
      <a href="#" class="nav-item" data-page="gyms">
        <span class="material-icons-round">store</span>
        <span>اعتماد النوادي</span>
      </a>
      <a href="#" class="nav-item" data-page="subscriptions">
        <span class="material-icons-round">card_membership</span>
        <span>الاشتراكات</span>
      </a>
      <a href="#" class="nav-item" data-page="notifications">
        <span class="material-icons-round">campaign</span>
        <span>الإشعارات</span>
      </a>
      <a href="#" class="nav-item" data-page="settings">
        <span class="material-icons-round">settings</span>
        <span>الإعدادات</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-avatar"><span class="material-icons-round">admin_panel_settings</span></div>
      <div class="admin-info">
        <span class="admin-name" id="adminName">Platform Admin</span>
        <span class="admin-role">مدير النظام</span>
      </div>
      <button class="logout-btn" id="logoutBtn" title="تسجيل الخروج">
        <span class="material-icons-round">logout</span>
      </button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main" id="main">
    <!-- Top bar -->
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle">
        <span class="material-icons-round">menu</span>
      </button>
      <h1 class="topbar-title" id="pageTitle">لوحة التحكم</h1>
      <div class="topbar-actions">
        <button class="icon-btn" title="تحديث" id="refreshBtn">
          <span class="material-icons-round">refresh</span>
        </button>
      </div>
    </header>

    <!-- Page content injected here -->
    <div class="content" id="content">
      <!-- Loading state -->
      <div class="loader-wrap" id="loader">
        <div class="loader"></div>
      </div>
    </div>
  </main>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
  <script>
    // Register Service Worker for offline support
    if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
      navigator.serviceWorker.register('/sw.js')
        .then((registration) => {
          console.log('Service Worker registered:', registration);
        })
        .catch((error) => {
          console.log('Service Worker registration failed:', error);
        });
    }
  </script>
</body>
</html>
