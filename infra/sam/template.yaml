AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: WizGym API - AWS SAM (Lambda + HTTP API)

Globals:
  Function:
    Runtime: nodejs22.x
    MemorySize: 256
    Timeout: 10
    Tracing: Active
    Environment:
      Variables:
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
        DYNAMODB_TABLE_NAME: wizgym-prod-core
        GYM_PHOTOS_BUCKET: wizzapp-gym-photos-prod-us-east-1
        SUBSCRIPTION_PROOFS_BUCKET: !Ref SubscriptionProofsBucket
        TRAINER_CERTS_BUCKET: !Ref TrainerCertificatesBucket
        OTPIQ_BASE_URL: https://api.otpiq.com/api
        OTPIQ_PROVIDER: whatsapp-sms

Resources:
  ApiGatewayHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 100
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - x-user-id
          - x-user-role
          - x-user-name

  SubscriptionProofsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: CleanupIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: ExpireOldProofs
            Status: Enabled
            ExpirationInDays: 365
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [PUT, GET, HEAD]
            AllowedOrigins: ['*']
            AllowedHeaders: ['*']
            ExposedHeaders: ['ETag']
            MaxAge: 3000

  TrainerCertificatesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: CleanupIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [PUT, GET, HEAD]
            AllowedOrigins: ['*']
            AllowedHeaders: ['*']
            ExposedHeaders: ['ETag']
            MaxAge: 3000

  WizGymApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/api
      Handler: dist/handler.handler
      MemorySize: 256
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGatewayHttpApi
            Path: /api/v1/health
            Method: GET
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGatewayHttpApi
            Path: /api/v1/{proxy+}
            Method: ANY
      Policies:
        - DynamoDBCrudPolicy:
            TableName: wizgym-prod-core
        - S3CrudPolicy:
            BucketName: wizzapp-gym-photos-prod-us-east-1
        - S3CrudPolicy:
            BucketName: !Ref SubscriptionProofsBucket
        - S3CrudPolicy:
            BucketName: !Ref TrainerCertificatesBucket
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource:
                - arn:aws:ssm:us-east-1:940075378952:parameter/wizgym/prod/*
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource:
                - arn:aws:kms:us-east-1:940075378952:key/*
              Condition:
                StringEquals:
                  kms:ViaService: ssm.us-east-1.amazonaws.com
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handler.ts
        Target: es2020
        Platform: node
        Sourcemap: true
        Minify: true
        External:
          - '@aws-sdk/*'

  # ── Subscription Expiry Checker (EventBridge cron, nightly 01:00 UTC) ──────
  SubscriptionExpiryCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/api
      Handler: dist/handlers/expiry-checker.handler
      Description: Nightly job — deactivates GYM SUBSCRIPTION items whose expiresAt has passed
      MemorySize: 128
      Timeout: 60
      Events:
        NightlyExpiry:
          Type: Schedule
          Properties:
            Schedule: cron(0 1 * * ? *)   # 01:00 UTC every day
            Description: Deactivate expired gym subscriptions
            Enabled: true
      Policies:
        - DynamoDBCrudPolicy:
            TableName: wizgym-prod-core
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/expiry-checker.ts
        Target: es2020
        Platform: node
        Sourcemap: true
        Minify: true
        External:
          - '@aws-sdk/*'

Outputs:
  ApiUrl:
    Description: HTTP API URL
    Value: !Sub 'https://${ApiGatewayHttpApi}.execute-api.${AWS::Region}.amazonaws.com'

  ExpiryCheckerFunctionArn:
    Description: ARN of the subscription expiry checker Lambda
    Value: !GetAtt SubscriptionExpiryCheckerFunction.Arn

  TrainerCertificatesBucketName:
    Description: S3 bucket used for trainer certificates/badges
    Value: !Ref TrainerCertificatesBucket
