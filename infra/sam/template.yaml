# filepath: infra/sam/template.yaml
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: WizGym API - AWS SAM (Lambda + HTTP API)

Globals:
  Function:
    Runtime: nodejs22.x
    MemorySize: 512
    Timeout: 10
    Tracing: Active
    Environment:
      Variables:
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
        DYNAMODB_TABLE_NAME: wizgym-prod-core
        GYM_PHOTOS_BUCKET: wizzapp-gym-photos-prod-us-east-1
        OTPIQ_BASE_URL: https://api.otpiq.com/api
        OTPIQ_PROVIDER: whatsapp-sms

Resources:
  ApiGatewayHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - '*'

  WizGymApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/api
      Handler: dist/handler.handler
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGatewayHttpApi
            Path: /api/v1/health
            Method: GET
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGatewayHttpApi
            Path: /api/v1/{proxy+}
            Method: ANY
      Policies:
        - DynamoDBCrudPolicy:
            TableName: wizgym-prod-core
        - S3CrudPolicy:
            BucketName: wizzapp-gym-photos-prod-us-east-1
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource:
                - arn:aws:ssm:us-east-1:940075378952:parameter/wizgym/prod/*
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource:
                - arn:aws:kms:us-east-1:940075378952:key/*
              Condition:
                StringEquals:
                  kms:ViaService: ssm.us-east-1.amazonaws.com
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handler.ts
        Target: es2020
        Platform: node
        Sourcemap: true
        Minify: false
        External:
          - '@aws-sdk/*'

  # ── Subscription Expiry Checker (EventBridge cron, nightly 01:00 UTC) ──────
  SubscriptionExpiryCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/api
      Handler: dist/handlers/expiry-checker.handler
      Description: Nightly job — deactivates GYM SUBSCRIPTION items whose expiresAt has passed
      MemorySize: 256
      Timeout: 60
      Events:
        NightlyExpiry:
          Type: Schedule
          Properties:
            Schedule: cron(0 1 * * ? *)   # 01:00 UTC every day
            Description: Deactivate expired gym subscriptions
            Enabled: true
      Policies:
        - DynamoDBCrudPolicy:
            TableName: wizgym-prod-core
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/expiry-checker.ts
        Target: es2020
        Platform: node
        Sourcemap: true
        Minify: false
        External:
          - '@aws-sdk/*'

Outputs:
  ApiUrl:
    Description: HTTP API URL
    Value: !Sub 'https://${ApiGatewayHttpApi}.execute-api.${AWS::Region}.amazonaws.com'

  ExpiryCheckerFunctionArn:
    Description: ARN of the subscription expiry checker Lambda
    Value: !GetAtt SubscriptionExpiryCheckerFunction.Arn
